name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    name: Tag, release, and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${version}"

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: ${{ inputs.bump }}" >&2
              exit 1
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          while git rev-parse -q --verify "refs/tags/${next}" >/dev/null; do
            patch=$((patch + 1))
            next="v${major}.${minor}.${patch}"
          done

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "tag=${next}" >> "$GITHUB_OUTPUT"
          echo "version=${next#v}" >> "$GITHUB_OUTPUT"
          echo "Next release: ${next}"

      - name: Resolve release source revision
        id: source
        shell: bash
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/doudou770/flyreq-image-studio"
          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "Image: ${image}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}
          labels: |
            org.opencontainers.image.title=FlyReq Image Studio
            org.opencontainers.image.description=Self-hosted AI image generation studio
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FlyReq Image Studio ${{ steps.version.outputs.tag }}
          target_commitish: master
          generate_release_notes: true
          body: |
            Docker images have been published to GitHub Container Registry:

            - `${{ steps.image.outputs.name }}:latest`
            - `${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}`
            - `${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}`
